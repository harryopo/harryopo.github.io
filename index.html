<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>harryopo — 项目展示门户</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0e0f;
    color: #e4e8eb;
    font-family: system-ui, -apple-system, sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }
  .container { max-width: 800px; margin: 0 auto; padding: 60px 24px; }
  h1 {
    font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
    font-size: 2rem;
    color: #10b981;
    margin-bottom: 8px;
  }
  .subtitle { color: #8b9398; font-size: 1.1rem; margin-bottom: 48px; }
  .card {
    display: block;
    background: #111618;
    border: 1px solid #262a2d;
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 12px;
    text-decoration: none;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #10b981; }
  .card-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    font-weight: 600;
    color: #e4e8eb;
    margin-bottom: 4px;
  }
  .card-url { font-size: 0.85rem; color: #5c6468; font-family: monospace; margin-bottom: 8px; }
  .card-desc { font-size: 0.95rem; color: #8b9398; }
  .footer { text-align: center; color: #5c6468; font-size: 0.8rem; margin-top: 60px; padding-top: 24px; border-top: 1px solid #1e2225; }
  .footer a { color: #8b9398; }
</style>
</head>
<body>
<div class="container">
  <h1>harryopo</h1>
  <p class="subtitle">个人项目门户 — 所有 Skill 宣传页、Web 应用集中托管</p>

  <a class="card" href="/ai-dev-workflow/">
    <div class="card-name">AI 开发全流程规范 Skill</div>
    <div class="card-url">harryopo.github.io/ai-dev-workflow/</div>
    <div class="card-desc">6 阶段门禁流水线 + 15 条硬性规则，让 AI Agent 严格按标准化流程开发</div>
  </a>

  <div class="footer">
    Powered by <a href="https://pages.github.com">GitHub Pages</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/harryopo">GitHub</a>
  </div>
</div>
</body>
</html>
