<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, initial-scale=1.0">
  <title>学习档案 — 知行读书</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="page-wrap">

        <!-- 个人信息卡片 -->
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 fade-in">
          <div class="flex items-center gap-4">
            <div class="bg-gradient-violet" style="width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:600">读</div>
            <div class="flex-1">
              <h1 class="text-2xl font-serif font-semibold">读者</h1>
              <div class="flex items-center gap-3 mt-4">
                <span class="tag tag-blue">注册 45 天</span>
                <span class="tag tag-violet">阅读达人</span>
                <span class="tag tag-green">连续学习 12 天</span>
              </div>
            </div>
            <div class="text-right">
              <p class="text-xs text-text-tertiary">加入时间</p>
              <p class="text-sm font-medium">2026年5月30日</p>
            </div>
          </div>
        </div>

        <!-- 4 统计 -->
        <div class="grid grid-cols-4 gap-4 mb-6">
          <div class="stat-card fade-in stagger-1">
            <p class="stat-label">已读书籍</p>
            <p class="stat-value text-primary">3</p>
          </div>
          <div class="stat-card fade-in stagger-2">
            <p class="stat-label">笔记总数</p>
            <p class="stat-value text-primary">43</p>
          </div>
          <div class="stat-card fade-in stagger-3">
            <p class="stat-label">卡片总数</p>
            <p class="stat-value text-primary">23</p>
          </div>
          <div class="stat-card fade-in stagger-4">
            <p class="stat-label">连续学习</p>
            <p class="stat-value text-amber">12 天</p>
          </div>
        </div>

        <!-- 学习热力图 -->
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 fade-in">
          <div class="flex items-center justify-between mb-6">
            <h2 class="text-lg font-semibold">学习热力图</h2>
            <div class="flex items-center gap-3 text-xs text-text-tertiary">
              <span>少</span>
              <span class="heatmap-cell" style="width:12px;height:12px;display:inline-block"></span>
              <span class="heatmap-cell l1" style="width:12px;height:12px;display:inline-block"></span>
              <span class="heatmap-cell l2" style="width:12px;height:12px;display:inline-block"></span>
              <span class="heatmap-cell l3" style="width:12px;height:12px;display:inline-block"></span>
              <span class="heatmap-cell l4" style="width:12px;height:12px;display:inline-block"></span>
              <span>多</span>
            </div>
          </div>
          <div class="heatmap" id="heatmap"></div>
        </div>

        <!-- 成就列表 -->
        <div class="bg-white rounded-2xl shadow-sm p-6 fade-in">
          <h2 class="text-lg font-semibold mb-6">成就徽章</h2>
          <div class="grid grid-cols-2 gap-4">
            <div class="achievement">
              <div class="achievement-icon bg-primary-light text-primary">📚</div>
              <div class="flex-1">
                <h3 class="font-medium">首次同步</h3>
                <p class="text-sm text-text-secondary mt-4">完成首次微信读书书架同步</p>
              </div>
              <span class="tag tag-green">已解锁</span>
            </div>
            <div class="achievement">
              <div class="achievement-icon bg-violet-light text-violet">✍️</div>
              <div class="flex-1">
                <h3 class="font-medium">笔记达人</h3>
                <p class="text-sm text-text-secondary mt-4">累计创建 40 条以上笔记</p>
              </div>
              <span class="tag tag-green">已解锁</span>
            </div>
            <div class="achievement">
              <div class="achievement-icon bg-amber-light text-amber">🗂️</div>
              <div class="flex-1">
                <h3 class="font-medium">卡片收藏家</h3>
                <p class="text-sm text-text-secondary mt-4">累计创建 20 张以上知识卡片</p>
              </div>
              <span class="tag tag-green">已解锁</span>
            </div>
            <div class="achievement">
              <div class="achievement-icon bg-green-light text-green">🔄</div>
              <div class="flex-1">
                <h3 class="font-medium">复习先锋</h3>
                <p class="text-sm text-text-secondary mt-4">累计完成 50 次以上卡片复习</p>
              </div>
              <span class="tag tag-green">已解锁</span>
            </div>
            <div class="achievement">
              <div class="achievement-icon bg-red-light text-red">💬</div>
              <div class="flex-1">
                <h3 class="font-medium">对话高手</h3>
                <p class="text-sm text-text-secondary mt-4">累计进行 150 次以上 AI 对话</p>
              </div>
              <span class="tag tag-green">已解锁</span>
            </div>
            <div class="achievement" style="opacity:.5">
              <div class="achievement-icon bg-surface-tertiary text-text-tertiary">🎯</div>
              <div class="flex-1">
                <h3 class="font-medium">方法论大师</h3>
                <p class="text-sm text-text-secondary mt-4">掌握 10 个以上方法论</p>
              </div>
              <span class="tag tag-gray">6 / 10</span>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>
  <script src="js/common.js"></script>
  <script>
    // 生成 5 行 x 7 列热力图 (35 格, 近 5 周)
    const heatmap = document.getElementById('heatmap');
    const levels = ['', 'l1', 'l2', 'l3', 'l4'];
    // 模拟数据:近期更密集
    const data = [
      0,1,2,1,0,2,3,
      1,2,3,2,1,3,4,
      2,3,2,3,4,3,2,
      3,4,3,4,3,4,3,
      4,3,4,3,4,3,4
    ];
    data.forEach(v => {
      const cell = document.createElement('div');
      cell.className = 'heatmap-cell' + (v ? ' ' + levels[v] : '');
      heatmap.appendChild(cell);
    });
  </script>
</body>
</html>
